<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Parallax - Starting</title>
		<style>
			:root {
				--background: #09090b; /* zinc-950 */
				--foreground: #fafafa;
				--muted: #a1a1aa; /* zinc-400 */
				--border: #27272a; /* zinc-800 */
				--font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			}
			
			body {
				margin: 0;
				padding: 0;
				width: 100vw;
				height: 100vh;
				background-color: var(--background);
				color: var(--foreground);
				font-family: var(--font-sans);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				/* Makes the whole splash screen draggable for frameless windows */
				-webkit-app-region: drag; 
				user-select: none;
			}

			.container {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1.5rem;
			}

			h1 {
				font-size: 1.5rem;
				font-weight: 600;
				margin: 0;
				letter-spacing: -0.025em;
			}

			.status {
				color: var(--muted);
				font-size: 0.875rem;
				margin: 0;
				display: flex;
				align-items: center;
				gap: 0.75rem;
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
			}

			.spinner {
				width: 14px;
				height: 14px;
				border: 2px solid var(--border);
				border-top-color: var(--foreground);
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
			}

			@keyframes spin {
				to { transform: rotate(360deg); }
			}
		</style>
	</head>

	<body>
		<div class="container">
			<h1>Parallax</h1>
			<div class="status">
				<div class="spinner"></div>
				<span>Initializing Parallax Engine...</span>
			</div>
		</div>
	</body>
</html>
